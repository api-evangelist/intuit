specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Intuit
providerId: intuit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Accounting
  - Financial
  - Tax Preparation
  - Small Business
  - Payments
description: Intuit Developer access (QuickBooks Online, QuickBooks Payments, QuickBooks Time, Lacerte
  Tax) is free to register and integrate. There is no per-API-call charge and no developer-tier subscription.
  Apps that monetize through the QuickBooks App Store pay Intuit a revenue share on referred end-customer
  subscriptions; end customers separately purchase QuickBooks Online plans (Simple Start, Essentials,
  Plus, Advanced) and QuickBooks Payments processing fees apply on transactions.
sources:
  - https://developer.intuit.com/app/developer/homepage
  - https://quickbooks.intuit.com/pricing/
  - https://quickbooks.intuit.com/payments/pricing/
plans:
  - id: intuit-developer
    name: Intuit Developer Program
    type: freemium
    description: Free developer registration providing sandbox and production access to Intuit APIs
      via OAuth 2.0. No platform fee for the developer; end-customer plan or transaction fees apply
      separately.
    entries:
      - label: Developer registration
        name: developer_account
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Sandbox usage
        name: sandbox_usage
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: QuickBooks Online API
      - name: QuickBooks Payments API
      - name: QuickBooks Time API
      - name: Lacerte Tax API
      - name: ProConnect Tax API
      - name: OAuth 2.0 + OpenID Connect
      - name: Sandbox companies
  - id: intuit-app-store-revshare
    name: QuickBooks App Store (revenue share)
    type: enterprise
    description: Apps published in the QuickBooks App Store can be marketed to QuickBooks customers;
      Intuit takes a revenue share on subscriptions sourced via the marketplace. Terms are negotiated
      per app.
    entries:
      - label: Marketplace revenue share
        name: app_store_revshare
        type: metered
        metric: subscription
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact intuit
        userMultiplied: false
    elements:
      - name: Listing in QuickBooks App Store
      - name: Co-marketing
      - name: Customer acquisition through QuickBooks ecosystem
  - id: intuit-payments-pass-through
    name: QuickBooks Payments (end-customer pass-through)
    type: usage-based
    description: When apps process payments via QuickBooks Payments on behalf of an end customer, the
      end customer (not the developer) is charged Intuit's standard QuickBooks Payments processing rates.
      Posted here for reference only.
    entries:
      - label: Card swipe / dip / tap (in-person)
        name: tx_card_present
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 2.5%
        userMultiplied: false
      - label: Card invoiced / online
        name: tx_card_online
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 2.99%
        userMultiplied: false
      - label: Card keyed
        name: tx_card_keyed
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 3.5%
        userMultiplied: false
      - label: ACH bank transfer
        name: tx_ach
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: 1%
        userMultiplied: false
    elements:
      - name: Pricing reflects end-customer rate, not developer charge
      - name: Custom rates available for high-volume processors via QuickBooks Payments sales
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
