        Id:
          type: string
          description: The unique identifier for the line item
          example: abc123
        LineNum:
          type: integer
          description: Line number within the transaction
          example: 10
        Description:
          type: string
          description: Free-form text description of the line item
          maxLength: 4000
          example: A sample description.
        Amount:
          type: number
          description: The total amount for the line item
          example: 42.5
        DetailType:
          type: string
          description: Specifies the type of line detail
          enum:
          - SalesItemLineDetail
          - GroupLineDetail
          - DescriptionOnly
          - DiscountLineDetail
          - SubTotalLineDetail
          example: SalesItemLineDetail
        SalesItemLineDetail:
          $ref: "#/components/schemas/SalesItemLineDetail"
        LinkedTxn:
          type: array
          items:
            $ref: "#/components/schemas/LinkedTxn"
