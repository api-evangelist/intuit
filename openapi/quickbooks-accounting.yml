                    Line3: example_value
                    Line4: example_value
                    Line5: example_value
                    City: example_value
                    CountrySubDivisionCode: example_value
                    PostalCode: example_value
                    Country: example_value
                    Lat: example_value
                    Long: example_value
                  ShipAddr:
                    Id: abc123
                    Line1: example_value
                    Line2: example_value
                    Line3: example_value
                    Line4: example_value
                    Line5: example_value
                    City: example_value
                    CountrySubDivisionCode: example_value
                    PostalCode: example_value
                    Country: example_value
                    Lat: example_value
                    Long: example_value
                  BillEmail:
                    Address: example_value
                  Line:
                  - Id: abc123
                    LineNum: 10
                    Description: A sample description.
                    Amount: 42.5
                    DetailType: SalesItemLineDetail
                    LinkedTxn: {}
                  TxnTaxDetail:
                    TotalTax: 42.5
                    TaxLine:
                    - {}
                  TotalAmt: 42.5
                  Balance: 42.5
                  Deposit: 42.5
                  DepositToAccountRef:
                    value: example_value
                    name: Example Title
                  SalesTermRef:
                    value: example_value
                    name: Example Title
                  PaymentMethodRef:
                    value: example_value
                    name: Example Title
                  CurrencyRef:
                    value: example_value
                    name: Example Title
                  ExchangeRate: 42.5
                  ShipDate: '2026-01-15'
                  ShipMethodRef:
