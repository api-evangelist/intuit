          enum:
          - Invoice
          - Payment
          - CreditMemo
          - Estimate
          - SalesReceipt
          - JournalEntry
          - Expense
          - StatementCharge
          - ReimburseCharge
          example: Invoice
      required:
      - TxnId
      - TxnType

    SalesItemLineDetail:
      type: object
      description: Detail for a sales item line
      properties:
        ItemRef:
          $ref: "#/components/schemas/ReferenceType"
        ClassRef:
          $ref: "#/components/schemas/ReferenceType"
        UnitPrice:
          type: number
          description: Unit price of the item
          example: 42.5
        RatePercent:
          type: number
          description: The discount rate as a percentage (for discount lines)
          example: 42.5
        Qty:
          type: number
          description: Number of items for the line
          example: 42.5
        ItemAccountRef:
          $ref: "#/components/schemas/ReferenceType"
        TaxCodeRef:
          $ref: "#/components/schemas/ReferenceType"
        ServiceDate:
          type: string
          format: date
          description: Date the service was performed
          example: '2026-01-15'
        DiscountAmt:
          type: number
          description: Discount amount applied to the line
          example: 42.5
        DiscountRate:
          type: number
          description: Discount rate as a percentage

          example: 42.5
    InvoiceLine:
      type: object
