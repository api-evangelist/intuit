specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Intuit
providerId: intuit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Accounting
  - Payments
  - Small Business
description: 'FOCUS-aligned FinOps for Intuit: free developer access plus end-customer-paid QuickBooks
  Online subscriptions and pass-through QuickBooks Payments processing fees. Developer cost is dominated
  by infrastructure to integrate, not Intuit API fees.'
sources:
  - https://developer.intuit.com/app/developer/homepage
  - https://quickbooks.intuit.com/pricing/
  - https://quickbooks.intuit.com/payments/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Intuit Inc.
serviceCategory: Accounting and Financial Software
billingModel:
  pricingCategory: Subscription + Take Rate
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Intuit Developer
  ServiceCategory: Accounting and Financial Software
  ProviderName: Intuit
  PublisherName: Intuit Inc.
  InvoiceIssuerName: Intuit Inc.
  BillingCurrency: USD
meters:
  - name: qbo_subscription
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - country
  - name: qbo_payments_card_volume
    unit: USD
    aggregation: sum
    dimensions:
      - card_present
      - card_brand
  - name: qbo_payments_card_count
    unit: transaction
    aggregation: sum
    dimensions:
      - channel
  - name: qbo_payments_ach_volume
    unit: USD
    aggregation: sum
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - realm
      - endpoint
  - name: payroll_run
    unit: payroll_run
    aggregation: sum
    dimensions:
      - employees
principles:
  - name: Visibility
    description: Use the QuickBooks Online Sales endpoints and Reports API to surface pass-through
      Payments fees; reconcile against Intuit merchant statements monthly.
  - name: Allocation
    description: Tag OAuth tokens / app installs by tenant so Payments fees and per-realm API usage
      can be allocated back to each end-customer or product line.
  - name: Optimization
    description: Negotiate QuickBooks Payments rates at scale; use ACH for high-value invoices to lower
      effective take rate; cache QBO read endpoints to stay under the per-realm 500/min throttle.
  - name: Accountability
    description: Designate a developer-relations owner to monitor API throttle incidents; finance owner
      reconciles QuickBooks Payments fees against Intuit settlement reports.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
