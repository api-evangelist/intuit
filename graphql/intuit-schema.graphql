# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  # Accounts
  account(id: ID!, realmId: ID!): Account
  accounts(realmId: ID!, startPosition: Int, maxResults: Int): AccountList

  # Transactions
  bill(id: ID!, realmId: ID!): Bill
  billPayment(id: ID!, realmId: ID!): BillPayment
  creditMemo(id: ID!, realmId: ID!): CreditMemo
  deposit(id: ID!, realmId: ID!): Deposit
  estimate(id: ID!, realmId: ID!): Estimate
  invoice(id: ID!, realmId: ID!): Invoice
  invoices(realmId: ID!, startPosition: Int, maxResults: Int): InvoiceList
  journalEntry(id: ID!, realmId: ID!): JournalEntry
  payment(id: ID!, realmId: ID!): Payment
  purchase(id: ID!, realmId: ID!): Purchase
  purchaseOrder(id: ID!, realmId: ID!): PurchaseOrder
  refundReceipt(id: ID!, realmId: ID!): RefundReceipt
  salesReceipt(id: ID!, realmId: ID!): SalesReceipt
  transfer(id: ID!, realmId: ID!): Transfer
  vendorCredit(id: ID!, realmId: ID!): VendorCredit

  # List objects
  customer(id: ID!, realmId: ID!): Customer
  customers(realmId: ID!, startPosition: Int, maxResults: Int): CustomerList
  customerType(id: ID!, realmId: ID!): CustomerType
  vendor(id: ID!, realmId: ID!): Vendor
  vendors(realmId: ID!, startPosition: Int, maxResults: Int): VendorList
  employee(id: ID!, realmId: ID!): Employee
  item(id: ID!, realmId: ID!): Item
  items(realmId: ID!, startPosition: Int, maxResults: Int): ItemList
  budget(id: ID!, realmId: ID!): Budget
  class(id: ID!, realmId: ID!): Class
  department(id: ID!, realmId: ID!): Department
  paymentMethod(id: ID!, realmId: ID!): PaymentMethod
  taxAgency(id: ID!, realmId: ID!): TaxAgency
  taxCode(id: ID!, realmId: ID!): TaxCode
  taxRate(id: ID!, realmId: ID!): TaxRate
  term(id: ID!, realmId: ID!): Term
  timeActivity(id: ID!, realmId: ID!): TimeActivity

  # Company
  companyInfo(realmId: ID!): CompanyInfo
  preferences(realmId: ID!): Preferences
  exchangeRate(sourceCurrencyCode: String!, targetCurrencyCode: String!, asOfDate: Date, realmId: ID!): ExchangeRate

  # Reports
  balanceSheet(realmId: ID!, startDate: Date, endDate: Date, reportBasis: ReportBasis): BalanceSheet
  profitLoss(realmId: ID!, startDate: Date, endDate: Date, reportBasis: ReportBasis): ProfitLoss
  cashFlow(realmId: ID!, startDate: Date, endDate: Date, reportBasis: ReportBasis): CashFlow
  budgetSummary(realmId: ID!, startDate: Date, endDate: Date): BudgetSummary
  customerBalance(realmId: ID!, asOfDate: Date, reportBasis: ReportBasis): CustomerBalance
  vendorBalance(realmId: ID!, asOfDate: Date, reportBasis: ReportBasis): VendorBalance

  # Utility
  transactionList(realmId: ID!, startDate: Date, endDate: Date): TransactionList
}

type Mutation {
  # Invoice mutations
  createInvoice(realmId: ID!, input: InvoiceInput!): Invoice
  updateInvoice(realmId: ID!, id: ID!, syncToken: String!, input: InvoiceInput!): Invoice
  voidInvoice(realmId: ID!, id: ID!, syncToken: String!): Invoice
  deleteInvoice(realmId: ID!, id: ID!, syncToken: String!): DeleteResponse
  sendInvoice(realmId: ID!, id: ID!, email: String!): Invoice

  # Customer mutations
  createCustomer(realmId: ID!, input: CustomerInput!): Customer
  updateCustomer(realmId: ID!, id: ID!, syncToken: String!, input: CustomerInput!): Customer

  # Vendor mutations
  createVendor(realmId: ID!, input: VendorInput!): Vendor
  updateVendor(realmId: ID!, id: ID!, syncToken: String!, input: VendorInput!): Vendor

  # Payment mutations
  createPayment(realmId: ID!, input: PaymentInput!): Payment
  updatePayment(realmId: ID!, id: ID!, syncToken: String!, input: PaymentInput!): Payment
  voidPayment(realmId: ID!, id: ID!, syncToken: String!): Payment

  # Bill mutations
  createBill(realmId: ID!, input: BillInput!): Bill
  updateBill(realmId: ID!, id: ID!, syncToken: String!, input: BillInput!): Bill

  # Item mutations
  createItem(realmId: ID!, input: ItemInput!): Item
  updateItem(realmId: ID!, id: ID!, syncToken: String!, input: ItemInput!): Item

  # Account mutations
  createAccount(realmId: ID!, input: AccountInput!): Account
  updateAccount(realmId: ID!, id: ID!, syncToken: String!, input: AccountInput!): Account
}

type DeleteResponse {
  Id: ID
  domain: String
  status: String
}

