      - Taxes
    humanURL: https://developer.intuit.com/app/developer/homepage
    properties:
      - url: https://developer.intuit.com/app/developer/homepage
        type: Documentation
    description: >-
      Intuit APIs provide developers with access to a wide range of services and functionalities
      to help them build innovative solutions for financial management, accounting,
      and tax-related needs. These APIs allow developers to integrate with popular
      Intuit products such as QuickBooks, TurboTax, and Mint, giving users the ability
      to securely access and manage their financial data across multiple platforms.
  - aid: intuit:quickbooks-accounting
    name: QuickBooks Online Accounting API
    tags:
