specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Intuit
providerId: intuit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Accounting
  - Financial
  - Small Business
description: Intuit enforces throttling on the QuickBooks Online (QBO) API per realm (company file)
  and per app, with separate caps for production and sandbox. Limits are documented at the app/realm
  scope; bursts beyond the cap return HTTP 429 with a Retry-After signal. QuickBooks Payments and Payroll
  APIs follow similar per-app throttling enforced at Intuit's gateway.
sources:
  - https://developer.intuit.com/app/developer/qbo/docs/develop/rest-api-features
  - https://developer.intuit.com/app/developer/qbo/docs/learn/rest-api-features
  - https://help.developer.intuit.com/s/topic/0TO80000000ku2bGAA/throttle-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: QuickBooks Online API (per realm, production)
    scope: realm
    metric: requests_per_minute
    limit: 500
    timeFrame: minute
    notes: 500 requests per minute per realm (company file).
  - name: QuickBooks Online API (per app, production)
    scope: app
    metric: concurrent_requests
    limit: 10
    notes: Up to 10 concurrent requests per app, per realm.
  - name: QuickBooks Online API (sandbox)
    scope: realm
    metric: requests_per_minute
    limit: 500
    timeFrame: minute
    notes: Sandbox shares the 500/min/realm cap; do not load-test in sandbox.
  - name: QuickBooks Payments API
    scope: app
    metric: requests_per_second
    limit: 10
    timeFrame: second
    notes: Standard cap is around 10 RPS per app; adjustments via support.
  - name: Batch endpoint
    scope: realm
    metric: requests_per_minute
    limit: 40
    timeFrame: minute
    notes: Batch requests count against the per-realm minute cap and the batch endpoint enforces a
      separate 40 batch-requests/minute ceiling.
policies:
  - name: Backoff
    description: On 429, honor the Retry-After header and back off exponentially with jitter.
  - name: Idempotency
    description: For payment and transactional writes, use the RequestId / Idempotency-Key supported
      by the Payments API to safely retry.
  - name: Realm scope
    description: Throttle counters reset per realm + per app pair; multi-tenant apps should rotate
      across realms to avoid hot-spotting.
  - name: Raise via support
    description: For sustained higher throughput, contact Intuit Developer Support; raises are case-by-case.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
