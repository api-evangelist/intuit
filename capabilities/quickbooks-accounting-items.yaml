naftiko: 1.0.0-alpha2
info:
  label: QuickBooks Online Accounting API — Items
  description: 'QuickBooks Online Accounting API — Items. 4 operations. Lead operation: Create an Item. Self-contained Naftiko
    capability covering one Intuit business surface.'
  tags:
  - Intuit
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTUIT_API_KEY: INTUIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: quickbooks-accounting-items
    baseUri: https://quickbooks.api.intuit.com/v3/company/{realmId}
    description: QuickBooks Online Accounting API — Items business capability. Self-contained, no shared references.
    resources:
    - name: item
      path: /item
      operations:
      - name: createitem
        method: POST
        description: Create an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: item-itemId
      path: /item/{itemId}
      operations:
      - name: readitem
        method: GET
        description: Read an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateitem
        method: POST
        description: Update an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sparse
          in: query
          type: boolean
          description: Set to true for a sparse (partial) update
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: query
      path: /query
      operations:
      - name: queryentities
        method: GET
        description: Query Entities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: 'A SQL-like query string. For example: SELECT * FROM Invoice WHERE TotalAmt > ''100.00'' ORDERBY TxnDate'
          required: true
    authentication:
      type: bearer
      token: '{{env.INTUIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: quickbooks-accounting-items-rest
    port: 8080
    description: REST adapter for QuickBooks Online Accounting API — Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/item
      name: item
      description: REST surface for item.
      operations:
      - method: POST
        name: createitem
        description: Create an Item
        call: quickbooks-accounting-items.createitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/item/{itemid}
      name: item-itemid
      description: REST surface for item-itemId.
      operations:
      - method: GET
        name: readitem
        description: Read an Item
        call: quickbooks-accounting-items.readitem
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateitem
        description: Update an Item
        call: quickbooks-accounting-items.updateitem
        with:
          sparse: rest.sparse
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/query
      name: query
      description: REST surface for query.
      operations:
      - method: GET
        name: queryentities
        description: Query Entities
        call: quickbooks-accounting-items.queryentities
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quickbooks-accounting-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for QuickBooks Online Accounting API — Items. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-item
      description: Create an Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: quickbooks-accounting-items.createitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-item
      description: Read an Item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quickbooks-accounting-items.readitem
      outputParameters:
      - type: object
        mapping: $.
    - name: update-item
      description: Update an Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: quickbooks-accounting-items.updateitem
      with:
        sparse: tools.sparse
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-entities
      description: Query Entities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quickbooks-accounting-items.queryentities
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
